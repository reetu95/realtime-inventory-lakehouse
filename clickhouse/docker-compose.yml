services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: inventory-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: inventory
      CLICKHOUSE_USER: inventory_user
      CLICKHOUSE_PASSWORD: local_dev_only
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./ddl:/docker-entrypoint-initdb.d
volumes:
  clickhouse_data:
